<svg width="260" height="160" viewBox="0 0 260 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --fur: #F4C99D;
      --fur-light: #FFE0B8;
      --fur-dark: #D9925F;
      --line: #8A5A38;
      --cheek: #EFA08E;
      --cream: #FFF0D8;
      --shadow: rgba(0, 0, 0, 0.14);
    }

    .sleeping-cat {
      transform-box: fill-box;
      transform-origin: center 75%;
      animation: sleepy-breathe 3.2s ease-in-out infinite;
    }

    .head {
      transform-box: fill-box;
      transform-origin: 45% 75%;
      animation: head-sleep 3.2s ease-in-out infinite;
    }

    .tail {
      transform-box: fill-box;
      transform-origin: 72% 55%;
      animation: tail-sleep 4.6s ease-in-out infinite;
    }

    .ear-left {
      transform-box: fill-box;
      transform-origin: 65% 90%;
      animation: ear-twitch 5.5s ease-in-out infinite;
    }

    .ear-right {
      transform-box: fill-box;
      transform-origin: 35% 90%;
      animation: ear-twitch 6.2s ease-in-out 1.2s infinite;
    }

    .zzz span {
      opacity: 0;
      animation: zzz-float 3.6s ease-in-out infinite;
    }

    .zzz .z1 {
      animation-delay: 0s;
    }

    .zzz .z2 {
      animation-delay: 0.8s;
    }

    .zzz .z3 {
      animation-delay: 1.6s;
    }

    .shadow {
      transform-origin: center;
      animation: shadow-sleep 3.2s ease-in-out infinite;
    }

    @keyframes sleepy-breathe {
      0%, 100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(1.5px) scale(1.012, 0.985);
      }
    }

    @keyframes head-sleep {
      0%, 100% {
        transform: rotate(-4deg) translateY(0);
      }

      50% {
        transform: rotate(-4deg) translateY(1.8px);
      }
    }

    @keyframes tail-sleep {
      0%, 100% {
        transform: rotate(0deg);
      }

      50% {
        transform: rotate(4deg);
      }
    }

    @keyframes ear-twitch {
      0%, 88%, 100% {
        transform: rotate(0deg);
      }

      92% {
        transform: rotate(5deg);
      }

      96% {
        transform: rotate(-2deg);
      }
    }

    @keyframes zzz-float {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.85);
      }

      30% {
        opacity: 0.85;
      }

      100% {
        opacity: 0;
        transform: translateY(-24px) scale(1.08);
      }
    }

    @keyframes shadow-sleep {
      0%, 100% {
        transform: scaleX(1);
        opacity: 0.14;
      }

      50% {
        transform: scaleX(0.96);
        opacity: 0.1;
      }
    }
  </style>

  <ellipse class="shadow" cx="130" cy="132" rx="78" ry="12" fill="var(--shadow)" />

  <g class="sleeping-cat">
    <!-- Tail curled around body -->
    <path
      class="tail"
      d="M82 101C55 104 42 87 50 70C57 55 76 55 84 69C91 81 78 91 68 86"
      stroke="var(--fur)"
      stroke-width="18"
      stroke-linecap="round"
    />
    <path
      class="tail"
      d="M82 101C55 104 42 87 50 70C57 55 76 55 84 69C91 81 78 91 68 86"
      stroke="var(--line)"
      stroke-width="3"
      stroke-linecap="round"
      opacity="0.22"
    />

    <!-- Body sleeping -->
    <path
      d="M72 94C76 66 107 50 147 54C184 58 204 78 198 103C192 128 158 133 119 127C86 122 68 109 72 94Z"
      fill="var(--fur)"
    />

    <!-- Belly -->
    <path
      d="M88 93C93 75 119 65 150 68C174 71 188 84 185 99C181 115 154 120 124 116C101 113 85 105 88 93Z"
      fill="var(--fur-light)"
      opacity="0.65"
    />

    <!-- Soft stripes -->
    <path d="M109 59C108 67 105 73 99 78" stroke="var(--fur-dark)" stroke-width="4" stroke-linecap="round" opacity="0.38" />
    <path d="M132 55C131 65 128 72 122 79" stroke="var(--fur-dark)" stroke-width="4" stroke-linecap="round" opacity="0.38" />
    <path d="M155 59C153 68 149 74 143 80" stroke="var(--fur-dark)" stroke-width="4" stroke-linecap="round" opacity="0.38" />

    <!-- Paws tucked -->
    <ellipse cx="122" cy="121" rx="13" ry="7" fill="var(--fur)" />
    <ellipse cx="157" cy="121" rx="13" ry="7" fill="var(--fur)" />
    <path d="M115 121C119 124 124 124 128 121" stroke="var(--line)" stroke-width="2" stroke-linecap="round" opacity="0.24" />
    <path d="M150 121C154 124 159 124 163 121" stroke="var(--line)" stroke-width="2" stroke-linecap="round" opacity="0.24" />

    <!-- Head resting -->
    <g class="head">
      <circle cx="189" cy="84" r="35" fill="var(--fur)" />

      <!-- Ears -->
      <path class="ear-left" d="M164 66L168 38L189 64Z" fill="var(--fur)" />
      <path class="ear-right" d="M197 62L220 42L217 75Z" fill="var(--fur)" />

      <path d="M170 63L173 51L182 63Z" fill="#F1A978" opacity="0.62" />
      <path d="M202 62L213 53L211 69Z" fill="#F1A978" opacity="0.62" />

      <!-- Forehead stripes -->
      <path d="M181 58C181 67 178 73 173 78" stroke="var(--fur-dark)" stroke-width="3.5" stroke-linecap="round" opacity="0.38" />
      <path d="M193 57C193 66 190 73 185 79" stroke="var(--fur-dark)" stroke-width="3.5" stroke-linecap="round" opacity="0.38" />

      <!-- Closed eye -->
      <path
        d="M197 83C201 86 207 86 211 83"
        stroke="var(--line)"
        stroke-width="3.2"
        stroke-linecap="round"
      />

      <!-- Nose -->
      <ellipse cx="219" cy="89" rx="3.2" ry="2.6" fill="var(--line)" opacity="0.72" />

      <!-- Small mouth -->
      <path
        d="M215 95C219 98 224 98 228 95"
        stroke="var(--line)"
        stroke-width="2.4"
        stroke-linecap="round"
        opacity="0.5"
      />

      <!-- Cheek -->
      <ellipse cx="207" cy="94" rx="5.5" ry="3.6" fill="var(--cheek)" opacity="0.42" />
    </g>
  </g>

  <!-- Zzz -->
  <g class="zzz" fill="var(--cream)" font-family="Georgia, serif" font-weight="500">
    <text class="z1" x="218" y="54" font-size="18">Z</text>
    <text class="z2" x="232" y="40" font-size="14">z</text>
    <text class="z3" x="243" y="28" font-size="11">z</text>
  </g>
</svg>